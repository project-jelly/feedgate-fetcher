services:
  postgres:
    image: postgres:16-alpine
    container_name: feedgate-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: feedgate
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d feedgate"]
      interval: 2s
      timeout: 2s
      retries: 15
